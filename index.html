<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCK STUDIO | Narrative & Contemporary Arts</title>
    <style>
        :root { --accent: #ff0000; --bg: #050505; --card-bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .grid-portfolio {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .work-card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            transition: border-color 0.3s;
            cursor: pointer;
        }
        .work-card:hover { border-color: var(--accent); }

        .video-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            background-color: #000;
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            opacity: 0.8; transition: 0.3s;
        }
        .work-card:hover .play-overlay { opacity: 1; background: rgba(0,0,0,0.2); }

        .play-btn {
            width: 60px; height: 60px;
            border: 2px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff;
        }

        .work-info { padding: 15px; }
        .work-info h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .work-info p { margin: 5px 0 0; color: #666; font-size: 0.8rem; font-family: monospace; }
        
        .status-tag { 
            display: inline-block; margin-top: 10px; font-size: 10px; 
            color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; 
        }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 50px;">
        <h1 style="letter-spacing: 5px;">DCK STUDIO</h1>
        <p style="color: #444;">NARRATIVE & CONTEMPORARY ARTS | ISTANBUL</p>
    </header>

    <div class="grid-portfolio">

        <div class="work-card" onclick="openDckPlayer('Z2RX1dLX_CM', 'La Odisea de la Tierra')">
            <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/Z2RX1dLX_CM/maxresdefault.jpg');">
                <div class="play-overlay"><div class="play-btn">▶</div></div>
            </div>
            <div class="work-info">
                <h3>La Odisea de la Tierra</h3>
                <p>NARRATIVE EDITOR | 8.2M VIEWS</p>
                <div class="status-tag">FULL DOCUMENTARY</div>
            </div>
        </div>

        <div class="work-card" onclick="openDckPlayer('ID_SUIVANT', 'Titre du Docu')">
            <div class="video-thumb" style="background-image: url('https://img.youtube.com/vi/ID_SUIVANT/maxresdefault.jpg');">
                <div class="play-overlay"><div class="play-btn">▶</div></div>
            </div>
            <div class="work-info">
                <h3>Titre du Projet</h3>
                <p>LEAD EDITOR | XX VIEWS</p>
                <div class="status-tag">PRODUCTION</div>
            </div>
        </div>

    </div>

    <script>
        function openDckPlayer(id, title) {
            const w = 1280;
            const h = 720;
            const left = (window.screen.width / 2) - (w / 2);
            const top = (window.screen.height / 2) - (h / 2);
            
            // LE HACK : mute=1 pour l'autoplay immédiat, nocookie pour le bypass
            const url = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=1&rel=0&modestbranding=1&enablejsapi=1&playlist=${id}`;
            
            // On ouvre la fenêtre popup sans barres d'adresse
            const playerWin = window.open('', 'DCK_PLAYER', 
                `width=${w},height=${h},top=${top},left=${left},toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes`
            );

            if (playerWin) {
                // On injecte un HTML minimaliste dans la popup pour un look "Studio"
                playerWin.document.write(`
                    <html>
                    <head><title>DCK STUDIO | ${title}</title></head>
                    <body style="margin:0; background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center;">
                        <iframe src="${url}" style="width:100vw; height:100vh; border:none;" allow="autoplay; fullscreen"></iframe>
                        <div style="position:fixed; bottom:10px; right:20px; color:#555; font-family:sans-serif; font-size:10px;">
                            DCK STUDIO - NARRATIVE ARTS
                        </div>
                    </body>
                    </html>
                `);
                playerWin.focus();
            } else {
                // Si le navigateur bloque la popup
                alert("Veuillez autoriser les fenêtres surgissantes pour visionner la vidéo.");
            }
        }
    </script>

</body>
</html>
